# Font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
font_size        12.0

# Fallback if JetBrains Mono not installed
# font_family    monospace

# Cursor
cursor_shape     block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
copy_on_select yes

# Window
remember_window_size  yes
window_padding_width  8
background_opacity    0.85
dynamic_background_opacity yes
wayland_titlebar_color #000000

# Tabs
tab_bar_style              powerline
tab_bar_edge               bottom
active_tab_font_style      bold
tab_bar_min_tabs           1
active_tab_background      #003300
active_tab_foreground      #00ff41
inactive_tab_background    #001a00
inactive_tab_foreground    #007a1f
tab_bar_background         #000000

# Theme — Hacker (Matrix-inspired)
background            #000000
foreground            #00ff41
selection_background  #003b00
selection_foreground  #00ff41
cursor                #00ff41
cursor_text_color     #000000

# Colors
color0   #000000
color1   #ff0000
color2   #00ff41
color3   #ffff00
color4   #00bfff
color5   #9b59b6
color6   #00ffff
color7   #00cc33
color8   #003300
color9   #ff4444
color10  #39ff14
color11  #f9e2af
color12  #1e90ff
color13  #bf5fff
color14  #00ffe5
color15  #00ff41

# Shortcuts
map ctrl+t new_tab
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+enter new_window
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
